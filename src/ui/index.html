<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AgentTap</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' rx='3' fill='%232b53c8'/><path d='M3 8h3l2-4 2 8 2-4h3' stroke='white' stroke-width='1.4' fill='none' stroke-linjoin='round'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* warm-paper light theme, cobalt signal accent */
    --bg: #f5f4ef; --panel: #ffffff; --panel2: #efece4; --border: #e4e1d8;
    --text: #1b1a17; --muted: #78746b; --accent: #2b53c8; --green: #1a7f4b;
    --red: #cc2f2f; --amber: #b3690f; --purple: #6d3fd4;
    --shadow: 0 1px 2px rgba(24,22,18,.05), 0 1px 3px rgba(24,22,18,.04);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); overflow: hidden;
    font-family: 'IBM Plex Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased;
    /* faint technical dot-grid for atmosphere */
    background-image: radial-gradient(rgba(24,22,18,.035) 1px, transparent 1px);
    background-size: 22px 22px; }
  code, .mono { font-family: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  a { color: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #d6d2c8; border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: #c4bfb3; background-clip: padding-box; }

  #app { display: grid; grid-template-columns: 200px 1fr; height: 100vh; }

  /* ---------- sidebar ---------- */
  aside { background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto; }
  .brand { display: flex; align-items: center; gap: 9px; padding: 16px 18px;
    font-size: 17px; font-weight: 700; letter-spacing: -.01em;
    border-bottom: 1px solid var(--border); }
  .brand svg { width: 22px; height: 22px; }
  .brand span { color: var(--accent); }
  .brand small { color: var(--muted); font-weight: 400; font-size: 10px; margin-left: auto; }
  nav { padding: 10px 8px; }
  .nav-group { font-size: 10px; text-transform: uppercase; letter-spacing: .08em;
    font-weight: 600; color: var(--muted); padding: 14px 10px 5px; }
  .nav-item { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
    padding: 8px 10px; border-radius: 8px; color: var(--muted); font-size: 13.5px;
    font-weight: 500; transition: background .12s, color .12s; }
  .nav-item:hover { background: var(--panel2); color: var(--text); }
  .nav-item.active { background: color-mix(in srgb, var(--accent) 12%, transparent);
    color: var(--accent); font-weight: 600; }
  .nav-item.active svg { stroke: var(--accent); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .sidebar-foot { margin-top: auto; padding: 14px 18px; border-top: 1px solid var(--border);
    font-size: 11px; line-height: 1.6; color: var(--muted); }

  /* ---------- main ---------- */
  main { display: flex; flex-direction: column; overflow: hidden; }
  .topbar { display: flex; align-items: center; gap: 14px; padding: 11px 20px;
    border-bottom: 1px solid var(--border); background: rgba(255,255,255,.8);
    backdrop-filter: saturate(1.4) blur(8px); }
  .topbar h2 { font-size: 15px; font-weight: 700; letter-spacing: -.01em; }
  .subtabs { display: flex; gap: 2px; margin-left: 8px; background: var(--panel2);
    padding: 3px; border-radius: 9px; }
  .subtabs button { padding: 4px 13px; border-radius: 6px; color: var(--muted);
    font-size: 12.5px; font-weight: 500; transition: background .12s, color .12s; }
  .subtabs button.active { background: var(--panel); color: var(--text);
    box-shadow: var(--shadow); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  select.range { background: var(--panel); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 6px 10px; font-size: 12.5px; font-weight: 500;
    box-shadow: var(--shadow); cursor: pointer; }
  #stats { display: flex; gap: 14px; color: var(--muted); font-size: 12px; }
  #stats b { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
  .content { flex: 1; overflow: hidden; }

  .badge { display: inline-block; padding: 1px 7px; border-radius: 20px; font-size: 11px;
    font-weight: 500; background: var(--panel2); color: var(--muted); white-space: nowrap; }
  .badge.llm { color: var(--purple); background: color-mix(in srgb, var(--purple) 11%, transparent); }
  .badge.tool { color: var(--amber); background: color-mix(in srgb, var(--amber) 12%, transparent); }
  .badge.agent { color: var(--green); background: color-mix(in srgb, var(--green) 12%, transparent); }
  .badge.err { color: var(--red); background: color-mix(in srgb, var(--red) 12%, transparent); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
  .dot.llm { background: var(--purple); } .dot.tool { background: var(--amber); }
  .dot.agent { background: var(--green); } .dot.chain, .dot.other { background: var(--muted); }
  .dot.error { background: var(--red); }

  /* ---------- tables ---------- */
  .table-wrap { height: calc(100% - 32px); overflow: auto; margin: 16px 20px;
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); }
  table.grid { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.grid th { position: sticky; top: 0; background: var(--panel2); text-align: left;
    padding: 9px 14px; color: var(--muted); font-weight: 600; font-size: 10.5px;
    text-transform: uppercase; letter-spacing: .04em;
    border-bottom: 1px solid var(--border); white-space: nowrap; z-index: 1; }
  table.grid td { padding: 9px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
  table.grid tbody tr:last-child td { border-bottom: none; }
  table.grid tr { cursor: pointer; }
  table.grid tbody tr:hover { background: var(--panel2); }
  table.grid tr.active { background: color-mix(in srgb, var(--accent) 8%, transparent);
    box-shadow: inset 3px 0 0 var(--accent); }
  .cell-preview { color: var(--muted); max-width: 320px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .empty { padding: 48px; text-align: center; color: var(--muted); line-height: 2; }

  /* ---------- traces master-detail ---------- */
  #traces-split { display: grid; grid-template-columns: minmax(320px, 400px) 1fr; height: 100%;
    background: var(--panel); }
  #trace-list-pane { border-right: 1px solid var(--border); overflow-y: auto; }
  .search { width: calc(100% - 24px); margin: 12px; padding: 8px 11px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px;
    transition: border-color .12s, box-shadow .12s; }
  .search:focus { outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent); }
  .trace-row { padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer;
    display: flex; flex-direction: column; gap: 4px; transition: background .1s; }
  .trace-row:hover { background: var(--panel2); }
  .trace-row.active { background: color-mix(in srgb, var(--accent) 8%, transparent);
    box-shadow: inset 3px 0 0 var(--accent); }
  .trace-title { font-weight: 600; font-size: 13px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; }
  .trace-meta { display: flex; gap: 8px; font-size: 11.5px; color: var(--muted); flex-wrap: wrap;
    align-items: center; }
  #trace-detail { overflow-y: auto; padding: 18px 22px; background: var(--bg); }
  .detail-placeholder { color: var(--muted); margin-top: 60px; text-align: center; line-height: 2; }

  #trace-head { border-bottom: 1px solid var(--border); padding-bottom: 14px; margin-bottom: 12px; }
  #trace-head h3 { font-size: 15px; font-weight: 700; margin-bottom: 5px; letter-spacing: -.01em; }
  .view-tabs, .dtabs { display: inline-flex; gap: 2px; margin: 12px 0; background: var(--panel2);
    padding: 3px; border-radius: 9px; }
  .view-tabs button, .dtabs button { padding: 4px 13px; border-radius: 6px; font-size: 12.5px;
    font-weight: 500; color: var(--muted); transition: background .12s, color .12s; }
  .view-tabs button.active, .dtabs button.active { background: var(--panel); color: var(--text);
    box-shadow: var(--shadow); }

  .span-children { margin-left: 20px; border-left: 1px solid var(--border); padding-left: 8px; }
  .span-line { display: flex; align-items: center; gap: 8px; padding: 6px 9px; border-radius: 7px;
    cursor: pointer; font-size: 13px; margin: 2px 0; transition: background .1s; }
  .span-line:hover { background: var(--panel); }
  .span-line.selected { background: var(--panel);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 45%, var(--border)), var(--shadow); }
  .span-dur { margin-left: auto; color: var(--muted); font-size: 12px; white-space: nowrap;
    font-variant-numeric: tabular-nums; }
  .span-tokens { color: var(--purple); font-size: 12px; white-space: nowrap; font-weight: 500; }

  .tl-row { display: grid; grid-template-columns: minmax(180px, 300px) 1fr; align-items: center;
    gap: 10px; padding: 4px 7px; border-radius: 7px; cursor: pointer; font-size: 12.5px; }
  .tl-row:hover { background: var(--panel); }
  .tl-row.selected { background: var(--panel);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 45%, var(--border)), var(--shadow); }
  .tl-name { display: flex; align-items: center; gap: 7px; overflow: hidden; white-space: nowrap;
    text-overflow: ellipsis; }
  .tl-track { position: relative; height: 16px; background: var(--panel2); border-radius: 5px; }
  .tl-bar { position: absolute; top: 2px; bottom: 2px; border-radius: 3px; min-width: 2px; }
  .tl-bar.llm { background: var(--purple); } .tl-bar.tool { background: var(--amber); }
  .tl-bar.agent { background: var(--green); } .tl-bar.chain, .tl-bar.other { background: #6e7681; }
  .tl-bar.error { background: var(--red); }
  .tl-label { position: absolute; font-size: 10.5px; color: var(--muted); top: 0; line-height: 16px; }

  #graph-wrap { overflow: auto; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); max-height: 55vh; }
  .gnode { cursor: pointer; }
  .gnode rect { fill: var(--panel); stroke: var(--border); }
  .gnode.selected rect { stroke: var(--accent); stroke-width: 2; }
  .gnode.llm rect { stroke: var(--purple); } .gnode.tool rect { stroke: var(--amber); }
  .gnode.agent rect { stroke: var(--green); } .gnode.error rect { stroke: var(--red); }
  .gnode text { fill: var(--text); font-size: 11.5px; }
  .gnode .sub { fill: var(--muted); font-size: 10px; }
  .gedge { fill: none; stroke: var(--border); stroke-width: 1.4; }

  #span-detail { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 14px; }
  #span-detail h4 { font-size: 14px; margin-bottom: 8px; }
  .kv { display: grid; grid-template-columns: 150px 1fr; gap: 4px 12px; font-size: 13px; margin-bottom: 12px; }
  .kv dt { color: var(--muted); } .kv dd { word-break: break-all; }
  .io-block { margin-bottom: 12px; }
  .io-block h5 { font-size: 11.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 6px; }
  .io-block pre { background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 12px; white-space: pre-wrap; word-break: break-word; max-height: 300px;
    overflow-y: auto; font-size: 12.5px; }
  .io-block.input pre { border-left: 3px solid var(--accent); }
  .io-block.output pre { border-left: 3px solid var(--green); }

  /* ---------- dashboard ---------- */
  .page-scroll { height: 100%; overflow-y: auto; padding: 22px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 14px; margin-bottom: 20px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 18px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--accent); opacity: .7; }
  .card .cnum { font-size: 24px; font-weight: 700; letter-spacing: -.02em;
    font-variant-numeric: tabular-nums; }
  .card .clbl { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .chart-box { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 18px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .chart-box h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em;
    margin-bottom: 12px; color: var(--muted); }
  .chart-box .table-wrap { margin: 0; border: none; box-shadow: none; }
  .hbar-row { display: grid; grid-template-columns: minmax(150px, 300px) 1fr 130px; gap: 12px;
    align-items: center; font-size: 12.5px; padding: 4px 0; }
  .hbar-track { height: 15px; background: var(--panel2); border-radius: 5px; overflow: hidden; }
  .hbar-fill { height: 100%; background: var(--purple); border-radius: 5px; }
  .hbar-val { color: var(--muted); text-align: right; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div id="app">
  <aside>
    <div class="brand">
      <svg viewBox="0 0 16 16"><rect width="16" height="16" rx="3" fill="#58a6ff"/><path d="M3 8h3l2-4 2 8 2-4h3" stroke="#fff" stroke-width="1.4" fill="none"/></svg>
      Agent<span>Tap</span>
    </div>
    <nav>
      <button class="nav-item" data-page="dashboard">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="5" height="5"/><rect x="9" y="2" width="5" height="5"/><rect x="2" y="9" width="5" height="5"/><rect x="9" y="9" width="5" height="5"/></svg>
        Dashboard</button>
      <div class="nav-group">Observability</div>
      <button class="nav-item" data-page="traces">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h8M2 12h5"/></svg>
        Tracing</button>
      <button class="nav-item" data-page="sessions">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 1.5"/></svg>
        Sessions</button>
      <button class="nav-item" data-page="users">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="2.5"/><path d="M3 13c0-2.5 2.2-4 5-4s5 1.5 5 4"/></svg>
        Users</button>
      <div class="nav-group">Analytics</div>
      <button class="nav-item" data-page="models">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2l5 3v6l-5 3-5-3V5z"/></svg>
        Models</button>
    </nav>
    <div class="sidebar-foot">
      Local-first agent observability<br>
      OTLP ingest + LLM proxy → SQLite
    </div>
  </aside>

  <main>
    <div class="topbar">
      <h2 id="page-title">Tracing</h2>
      <div class="subtabs" id="subtabs"></div>
      <div class="topbar-right">
        <div id="stats"></div>
        <select class="range" id="range">
          <option value="0">All time</option>
          <option value="3600000">Past 1h</option>
          <option value="86400000">Past 24h</option>
          <option value="604800000" selected>Past 7d</option>
          <option value="2592000000">Past 30d</option>
        </select>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<script>
const $ = (s, el = document) => el.querySelector(s);
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
const fmtDur = (ms) => ms == null ? '—' : ms >= 1000 ? (ms/1000).toFixed(2)+'s' : Math.round(ms)+'ms';
const fmtTok = (n) => (n ?? 0) >= 1000 ? ((n)/1000).toFixed(1)+'k' : String(n ?? 0);
const nsToMs = (ns) => Number(BigInt(ns) / 1000000n);
const fmtTime = (ms) => new Date(ms).toLocaleString();

let page = 'traces';
let range = Number(localStorage.getItem('ot-range') ?? 604800000);
let sub = 'list'; // traces sub-tab: list | observations
const q = () => range > 0 ? '&since=' + range : '';

/* ============ header stats ============ */
async function loadStats() {
  const { totals } = await (await fetch('/api/stats?x=1' + q())).json();
  $('#stats').innerHTML =
    `<span><b>${totals.traces ?? 0}</b> traces</span>` +
    `<span><b>${totals.llm_calls ?? 0}</b> LLM</span>` +
    `<span><b>${fmtTok(totals.prompt_tokens)}</b>/<b>${fmtTok(totals.completion_tokens)}</b> tok</span>` +
    ((totals.cost_usd ?? 0) > 0 ? `<span><b>$${totals.cost_usd.toFixed(4)}</b></span>` : '');
}

/* ============ trace detail (shared) ============ */
let currentSpans = [], selectedSpanId = null, activeTraceId = null;
let viewMode = localStorage.getItem('ot-view') || 'timeline';
let detailTab = 'preview', traceSignature = '';
const typeOf = (s) => s.status_code === 'ERROR' ? 'error' : (s.span_type || 'other');

function buildTree(spans) {
  const byId = new Map(spans.map((s) => [s.span_id, { span: s, children: [] }]));
  const roots = [];
  for (const node of byId.values()) {
    const parent = node.span.parent_span_id && byId.get(node.span.parent_span_id);
    if (parent) parent.children.push(node); else roots.push(node);
  }
  const sortRec = (ns) => { ns.sort((a,b) => Number(BigInt(a.span.start_ns) - BigInt(b.span.start_ns))); ns.forEach(n => sortRec(n.children)); };
  sortRec(roots);
  return roots;
}
function renderTreeView(roots) {
  const rec = (node) => {
    const s = node.span;
    return `<div><div class="span-line${s.span_id===selectedSpanId?' selected':''}" data-span="${s.span_id}">
      <span class="dot ${typeOf(s)}"></span><span>${esc(s.name)}</span>
      ${s.model?`<span class="badge llm">${esc(String(s.model).split('/').pop())}</span>`:''}
      ${s.total_tokens?`<span class="span-tokens">${fmtTok(s.total_tokens)} tok</span>`:''}
      <span class="span-dur">${fmtDur(s.duration_ms)}</span></div>
      ${node.children.length?`<div class="span-children">${node.children.map(rec).join('')}</div>`:''}</div>`;
  };
  return roots.map(rec).join('');
}
function renderTimelineView(roots) {
  const t0 = Math.min(...currentSpans.map(s => nsToMs(s.start_ns)));
  const t1 = Math.max(...currentSpans.map(s => nsToMs(s.end_ns)));
  const total = Math.max(t1 - t0, 1), rows = [];
  const walk = (node, depth) => {
    const s = node.span, left = (nsToMs(s.start_ns)-t0)/total*100, width = Math.max(s.duration_ms/total*100, 0.5);
    const side = left+width < 70 ? `left:calc(${Math.min(left+width,96)}% + 5px)` : `right:calc(${100-left}% + 5px)`;
    rows.push(`<div class="tl-row${s.span_id===selectedSpanId?' selected':''}" data-span="${s.span_id}">
      <div class="tl-name" style="padding-left:${depth*16}px"><span class="dot ${typeOf(s)}"></span><span>${esc(s.name)}</span></div>
      <div class="tl-track"><div class="tl-bar ${typeOf(s)}" style="left:${left}%;width:${width}%"></div>
        <span class="tl-label" style="${side}">${fmtDur(s.duration_ms)}${s.total_tokens?' · '+fmtTok(s.total_tokens)+' tok':''}</span></div></div>`);
    node.children.forEach(c => walk(c, depth+1));
  };
  roots.forEach(r => walk(r, 0));
  return `<div style="font-size:11px;color:var(--muted);text-align:right;margin-bottom:4px">total ${fmtDur(total)}</div>` + rows.join('');
}
function renderGraphView(roots) {
  const NW=170, NH=46, GX=70, GY=14; let leafY=0; const nodes=[], edges=[];
  const layout = (node, depth) => {
    const s = node.span, x = depth*(NW+GX); let y;
    if (!node.children.length) { y = leafY; leafY += NH+GY; }
    else { const cy = node.children.map(c => layout(c, depth+1)); y = (Math.min(...cy)+Math.max(...cy))/2; }
    nodes.push({s,x,y}); for (const c of node.children) edges.push({from:{x,y}, to:c.span}); return y;
  };
  roots.forEach(r => { layout(r,0); leafY += GY; });
  const pos = new Map(nodes.map(n => [n.s.span_id, n]));
  const width = Math.max(...nodes.map(n=>n.x))+NW+20, height = Math.max(...nodes.map(n=>n.y))+NH+20;
  const eEls = edges.map(e => { const to=pos.get(e.to.span_id); const x1=e.from.x+NW,y1=e.from.y+NH/2+10,x2=to.x,y2=to.y+NH/2+10,mx=(x1+x2)/2;
    return `<path class="gedge" d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}"/>`; }).join('');
  const nEls = nodes.map(({s,x,y}) => `<g class="gnode ${typeOf(s)}${s.span_id===selectedSpanId?' selected':''}" data-span="${s.span_id}" transform="translate(${x},${y+10})">
    <rect width="${NW}" height="${NH}" rx="8"/>
    <circle cx="14" cy="16" r="4" fill="${({llm:'var(--purple)',tool:'var(--amber)',agent:'var(--green)',error:'var(--red)'}[typeOf(s)])??'var(--muted)'}"/>
    <text x="26" y="20">${esc(s.name.length>17?s.name.slice(0,16)+'…':s.name)}</text>
    <text x="26" y="36" class="sub">${fmtDur(s.duration_ms)}${s.total_tokens?' · '+fmtTok(s.total_tokens)+' tok':''}</text></g>`).join('');
  return `<div id="graph-wrap"><svg width="${width}" height="${height+20}" xmlns="http://www.w3.org/2000/svg">${eEls}${nEls}</svg></div>`;
}
function renderTraceView() {
  const roots = buildTree(currentSpans);
  $('#trace-view').innerHTML = viewMode==='tree'?renderTreeView(roots):viewMode==='graph'?renderGraphView(roots):renderTimelineView(roots);
  document.querySelectorAll('.view-tabs button').forEach(b => b.classList.toggle('active', b.dataset.view===viewMode));
}
function renderSpanDetail() {
  const s = currentSpans.find(x => x.span_id === selectedSpanId);
  const el = $('#span-detail'); if (!s) { el.innerHTML=''; return; }
  const attrs = JSON.parse(s.attributes_json || '{}'), events = JSON.parse(s.events_json || '[]');
  const tabs = `<div class="dtabs">
    <button data-dtab="preview" class="${detailTab==='preview'?'active':''}">Preview</button>
    <button data-dtab="attrs" class="${detailTab==='attrs'?'active':''}">Attributes (${Object.keys(attrs).length})</button>
    <button data-dtab="events" class="${detailTab==='events'?'active':''}">Events (${events.length})</button></div>`;
  let body = '';
  if (detailTab === 'preview') {
    body = (s.input_text?`<div class="io-block input"><h5>Input</h5><pre>${esc(s.input_text)}</pre></div>`:'') +
      (s.output_text?`<div class="io-block output"><h5>Output</h5><pre>${esc(s.output_text)}</pre></div>`:'') ||
      '<div style="color:var(--muted);font-size:13px">No parsed input/output — see Attributes.</div>';
  } else if (detailTab === 'attrs') {
    const dp = (v) => { if (typeof v==='string' && /^\s*[{\[]/.test(v)) { try { return JSON.parse(v); } catch {} } return v; };
    body = Object.entries(attrs).map(([k,v]) => { const p=dp(v), isO=typeof p==='object'&&p!==null;
      const t = isO?JSON.stringify(p,null,2):String(p), big=t.length>400;
      return `<details class="io-block"${big?'':' open'}><summary style="cursor:pointer;font-size:12px;color:var(--accent)" class="mono">${esc(k)}</summary><pre>${esc(t)}</pre></details>`;
    }).join('') || '<div style="color:var(--muted)">No attributes.</div>';
  } else {
    body = events.length ? events.map(ev => `<div class="io-block"><h5>${esc(ev.name)}</h5><pre>${esc(JSON.stringify(ev.attributes??{},null,2))}</pre></div>`).join('')
      : '<div style="color:var(--muted);font-size:13px">No events.</div>';
  }
  el.innerHTML = `<h4>${esc(s.name)}</h4><dl class="kv">
    <dt>Span / Parent</dt><dd class="mono">${s.span_id}${s.parent_span_id?' ← '+s.parent_span_id:''}</dd>
    <dt>Type / Kind</dt><dd>${esc(s.span_type)} / ${esc(s.kind)}${s.scope?' · '+esc(s.scope):''}</dd>
    ${s.model?`<dt>Model</dt><dd>${esc(s.model)}</dd>`:''}
    ${s.user_id?`<dt>User</dt><dd class="mono">${esc(s.user_id)}</dd>`:''}
    ${s.session_id?`<dt>Session</dt><dd class="mono">${esc(s.session_id)}</dd>`:''}
    <dt>Start · Duration</dt><dd>${fmtTime(nsToMs(s.start_ns))} · ${fmtDur(s.duration_ms)}</dd>
    <dt>Status</dt><dd>${esc(s.status_code)}${s.status_message?' — '+esc(s.status_message):''}</dd>
    ${s.total_tokens?`<dt>Tokens</dt><dd>${s.prompt_tokens??'?'} in + ${s.completion_tokens??'?'} out = ${s.total_tokens}</dd>`:''}
    ${s.cost_usd?`<dt>Cost</dt><dd>$${s.cost_usd}</dd>`:''}</dl>${tabs}${body}`;
}
async function openTrace(traceId, keep = false) {
  activeTraceId = traceId;
  document.querySelectorAll('.trace-row').forEach(el => el.classList.toggle('active', el.dataset.id===traceId));
  const { spans } = await (await fetch('/api/traces/' + traceId)).json();
  const sig = traceId + ':' + spans.map(s => s.span_id + s.end_ns).join(',');
  if (keep && sig === traceSignature) return;
  traceSignature = sig; currentSpans = spans;
  if (!keep || !spans.some(s => s.span_id===selectedSpanId))
    selectedSpanId = (spans.find(s => s.span_type==='llm') ?? spans[0])?.span_id ?? null;
  const t0 = Math.min(...spans.map(s=>nsToMs(s.start_ns))), t1 = Math.max(...spans.map(s=>nsToMs(s.end_ns)));
  const tok = spans.reduce((a,s)=>a+(s.total_tokens??0),0), cost = spans.reduce((a,s)=>a+(s.cost_usd??0),0);
  const llm = spans.filter(s=>s.span_type==='llm').length;
  $('#trace-detail').innerHTML = `<div id="trace-head"><h3>${esc(spans.find(s=>!s.parent_span_id)?.name ?? traceId.slice(0,16))}</h3>
    <div class="trace-meta"><span class="mono">${traceId.slice(0,24)}</span><span>${fmtTime(t0)}</span>
      <span>${fmtDur(t1-t0)}</span><span>${spans.length} spans</span><span>${llm} LLM</span><span>${fmtTok(tok)} tok</span>
      ${cost>0?`<span>$${cost.toFixed(4)}</span>`:''}<span class="badge">${esc(spans[0]?.service??'')}</span>
      ${spans[0]?.user_id?`<span class="badge">user ${esc(String(spans[0].user_id).slice(0,14))}</span>`:''}</div></div>
    <div class="view-tabs"><button data-view="timeline">Timeline</button><button data-view="tree">Tree</button><button data-view="graph">Graph</button></div>
    <div id="trace-view"></div><div id="span-detail"></div>`;
  renderTraceView(); renderSpanDetail();
}

/* ============ pages ============ */
async function renderTraces() {
  sub = 'list';
  $('#content').innerHTML = `<div id="traces-split">
    <div id="trace-list-pane"><input class="search" id="tsearch" placeholder="Search name, model, content…"><div id="trace-list"></div></div>
    <div id="trace-detail"><div class="detail-placeholder">Select a trace to inspect<br><span style="font-size:12px">Timeline · Tree · Graph views · Preview / Attributes / Events</span></div></div></div>`;
  $('#tsearch').addEventListener('input', () => { clearTimeout(window._st); window._st = setTimeout(loadTraceList, 250); });
  await loadTraceList();
}
let sessionFilter = null, userFilter = null;
async function loadTraceList() {
  const term = ($('#tsearch')?.value ?? '').trim();
  const url = '/api/traces?limit=200' + q() + (term?'&q='+encodeURIComponent(term):'') +
    (sessionFilter?'&session='+encodeURIComponent(sessionFilter):'') + (userFilter?'&user='+encodeURIComponent(userFilter):'');
  const { traces } = await (await fetch(url)).json();
  const chip = (sessionFilter||userFilter)
    ? `<div style="padding:8px 12px"><span class="badge" style="color:var(--accent);border-color:var(--accent)">
       ${sessionFilter?'session':'user'}: ${esc((sessionFilter||userFilter).slice(0,22))}
       <a href="#" id="clear-filter" style="color:var(--muted);margin-left:6px;text-decoration:none">✕</a></span></div>` : '';
  $('#trace-list').innerHTML = chip + (traces.map(t => `<div class="trace-row${t.trace_id===activeTraceId?' active':''}" data-id="${t.trace_id}">
    <div class="trace-title">${esc(t.root_name || t.model || t.trace_id.slice(0,16))}</div>
    <div class="trace-meta"><span>${fmtTime(t.start_ms)}</span><span>${fmtDur(t.end_ms-t.start_ms)}</span>
      <span class="badge">${esc(t.service)}</span><span class="badge llm">${t.llm_calls} LLM · ${fmtTok(t.total_tokens)} tok</span>
      ${t.error_count>0?`<span class="badge err">${t.error_count} err</span>`:''}</div></div>`).join('') ||
    `<div class="empty">No traces in range.<br><span style="font-size:12px">Point an OTLP exporter at <code>/v1/traces</code> or a base URL at <code>/proxy/*</code></span></div>`);
}

async function renderObservations() {
  sub = 'observations';
  $('#content').innerHTML = `<div class="table-wrap"><table class="grid" id="obs-table">
    <thead><tr><th>Time</th><th>Name</th><th>Type</th><th>Model</th><th>Input</th><th>Output</th>
      <th class="num">Latency</th><th class="num">In</th><th class="num">Out</th><th class="num">Cost</th></tr></thead>
    <tbody id="obs-body"></tbody></table></div>`;
  await loadObservations();
}
async function loadObservations() {
  const { observations } = await (await fetch('/api/observations?limit=300' + q())).json();
  $('#obs-body').innerHTML = observations.map(o => `<tr data-trace="${o.trace_id}">
    <td style="white-space:nowrap">${new Date(o.start_ms).toLocaleTimeString()}</td>
    <td><span class="dot ${o.status_code==='ERROR'?'error':(o.span_type||'other')}"></span> ${esc(o.name)}</td>
    <td>${esc(o.span_type)}</td><td>${esc(o.model?String(o.model).split('/').pop():'—')}</td>
    <td class="cell-preview">${esc(o.input_preview||'')}</td><td class="cell-preview">${esc(o.output_preview||'')}</td>
    <td class="num">${fmtDur(o.duration_ms)}</td><td class="num">${o.prompt_tokens??'—'}</td>
    <td class="num">${o.completion_tokens??'—'}</td><td class="num">${o.cost_usd?'$'+o.cost_usd.toFixed(4):'—'}</td></tr>`).join('')
    || `<tr><td colspan="10" class="empty">No observations in range.</td></tr>`;
}

async function renderSessions() {
  $('#content').innerHTML = `<div class="table-wrap"><table class="grid">
    <thead><tr><th>Session</th><th>First → Last</th><th>Service</th><th class="num">Traces</th>
      <th class="num">Spans</th><th class="num">LLM</th><th class="num">Tokens</th><th class="num">Cost</th></tr></thead>
    <tbody id="sess-body"></tbody></table></div>`;
  const { sessions } = await (await fetch('/api/sessions?limit=200')).json();
  $('#sess-body').innerHTML = sessions.map(s => `<tr data-session="${esc(s.session_id)}">
    <td class="mono">${esc(s.session_id)}</td><td style="white-space:nowrap">${new Date(s.first_ms).toLocaleString()} → ${new Date(s.last_ms).toLocaleTimeString()}</td>
    <td><span class="badge">${esc(s.service)}</span></td><td class="num">${s.trace_count}</td><td class="num">${s.span_count}</td>
    <td class="num">${s.llm_calls}</td><td class="num">${fmtTok(s.total_tokens)}</td><td class="num">${s.cost_usd?'$'+s.cost_usd.toFixed(4):'—'}</td></tr>`).join('')
    || `<tr><td colspan="8" class="empty">No sessions yet.<br><span style="font-size:12px">Sessions group traces by conversation (session.id / gen_ai.conversation.id / NeMo Relay sessionId, or an x-session-id proxy header).</span></td></tr>`;
}

async function renderUsers() {
  $('#content').innerHTML = `<div class="table-wrap"><table class="grid">
    <thead><tr><th>User</th><th>First → Last</th><th>Service</th><th class="num">Sessions</th>
      <th class="num">Traces</th><th class="num">LLM</th><th class="num">Tokens</th><th class="num">Cost</th></tr></thead>
    <tbody id="user-body"></tbody></table></div>`;
  const { users } = await (await fetch('/api/users?limit=200')).json();
  $('#user-body').innerHTML = users.map(u => `<tr data-user="${esc(u.user_id)}">
    <td class="mono">${esc(u.user_id)}</td><td style="white-space:nowrap">${new Date(u.first_ms).toLocaleString()} → ${new Date(u.last_ms).toLocaleTimeString()}</td>
    <td><span class="badge">${esc(u.service)}</span></td><td class="num">${u.session_count}</td><td class="num">${u.trace_count}</td>
    <td class="num">${u.llm_calls}</td><td class="num">${fmtTok(u.total_tokens)}</td><td class="num">${u.cost_usd?'$'+u.cost_usd.toFixed(4):'—'}</td></tr>`).join('')
    || `<tr><td colspan="8" class="empty">No users identified yet.<br><span style="font-size:12px">User id comes from user.id / gen_ai.user.id attributes, or OpenClaw's Feishu open-id in messages.</span></td></tr>`;
}

async function renderModels() {
  const { models, services } = await (await fetch('/api/stats?x=1' + q())).json();
  const maxTok = Math.max(...models.map(m => (m.prompt_tokens??0)+(m.completion_tokens??0)), 1);
  $('#content').innerHTML = `<div class="page-scroll">
    <div class="chart-box"><h3>Models</h3><div class="table-wrap"><table class="grid">
      <thead><tr><th>Model</th><th class="num">Calls</th><th class="num">Input</th><th class="num">Output</th>
        <th class="num">Avg latency</th><th class="num">Cost</th><th style="width:30%">Token share</th></tr></thead><tbody>
      ${models.map(m => { const tk=(m.prompt_tokens??0)+(m.completion_tokens??0); return `<tr>
        <td>${esc(m.model)}</td><td class="num">${m.calls}</td><td class="num">${fmtTok(m.prompt_tokens)}</td>
        <td class="num">${fmtTok(m.completion_tokens)}</td><td class="num">${fmtDur(m.avg_ms)}</td>
        <td class="num">${m.cost_usd?'$'+m.cost_usd.toFixed(4):'—'}</td>
        <td><div class="hbar-track"><div class="hbar-fill" style="width:${tk/maxTok*100}%"></div></div></td></tr>`;}).join('')
      || `<tr><td colspan="7" class="empty">No model calls in range.</td></tr>`}</tbody></table></div></div>
    <div class="chart-box"><h3>Services</h3>${services.map(s => `<div class="hbar-row"><span>${esc(s.service)}</span>
      <div class="hbar-track"><div class="hbar-fill" style="width:${s.spans/Math.max(...services.map(x=>x.spans),1)*100}%;background:var(--accent)"></div></div>
      <span class="hbar-val">${s.traces} traces · ${s.spans} spans</span></div>`).join('')}</div></div>`;
}

async function renderDashboard() {
  const [{ totals, models, services }, { traces }] = await Promise.all([
    (await fetch('/api/stats?x=1' + q())).json(),
    (await fetch('/api/traces?limit=500' + q())).json(),
  ]);
  const now = Date.now(), buckets = Array.from({length:24}, () => ({t:0, tok:0}));
  for (const t of traces) { const age = Math.floor((now - t.start_ms)/3600000);
    if (age>=0 && age<24) { buckets[23-age].t++; buckets[23-age].tok += t.total_tokens??0; } }
  const maxT = Math.max(...buckets.map(b=>b.t), 1), bw = 100/24;
  const bars = buckets.map((b,i) => `<rect x="${i*bw+0.4}%" y="${100-b.t/maxT*92}%" width="${bw-0.8}%" height="${b.t/maxT*92}%" rx="2" fill="var(--accent)"><title>${b.t} traces · ${fmtTok(b.tok)} tok</title></rect>`).join('');
  const maxMTok = Math.max(...models.map(m=>(m.prompt_tokens??0)+(m.completion_tokens??0)), 1);
  $('#content').innerHTML = `<div class="page-scroll">
    <div class="cards">
      <div class="card"><div class="cnum">${totals.traces??0}</div><div class="clbl">Traces</div></div>
      <div class="card"><div class="cnum">${totals.spans??0}</div><div class="clbl">Spans</div></div>
      <div class="card"><div class="cnum">${totals.llm_calls??0}</div><div class="clbl">LLM calls</div></div>
      <div class="card"><div class="cnum">${fmtTok(totals.prompt_tokens)}</div><div class="clbl">Input tokens</div></div>
      <div class="card"><div class="cnum">${fmtTok(totals.completion_tokens)}</div><div class="clbl">Output tokens</div></div>
      <div class="card"><div class="cnum">$${(totals.cost_usd??0).toFixed(4)}</div><div class="clbl">Cost</div></div></div>
    <div class="chart-box"><h3>Traces — last 24 hours</h3><svg width="100%" height="120">${bars}</svg></div>
    <div class="chart-box"><h3>Token usage by model</h3>${models.map(m => { const tk=(m.prompt_tokens??0)+(m.completion_tokens??0);
      return `<div class="hbar-row"><span title="${esc(m.model)}">${esc(m.model)}</span>
        <div class="hbar-track"><div class="hbar-fill" style="width:${tk/maxMTok*100}%"></div></div>
        <span class="hbar-val">${m.calls} calls · ${fmtTok(tk)}</span></div>`; }).join('') || '<div style="color:var(--muted);font-size:13px">No LLM calls in range.</div>'}</div>
    <div class="chart-box"><h3>Services</h3>${services.map(s => `<div class="hbar-row"><span>${esc(s.service)}</span>
      <div class="hbar-track"><div class="hbar-fill" style="width:${s.spans/Math.max(...services.map(x=>x.spans),1)*100}%;background:var(--accent)"></div></div>
      <span class="hbar-val">${s.traces} traces · ${s.spans} spans</span></div>`).join('')}</div></div>`;
}

/* ============ navigation ============ */
const PAGES = {
  dashboard: { title: 'Dashboard', render: renderDashboard },
  traces: { title: 'Tracing', render: renderTraces, subtabs: true },
  sessions: { title: 'Sessions', render: renderSessions },
  users: { title: 'Users', render: renderUsers },
  models: { title: 'Models', render: renderModels },
};
async function navigate(next) {
  page = next;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.page===next));
  $('#page-title').textContent = PAGES[next].title;
  $('#subtabs').innerHTML = PAGES[next].subtabs
    ? `<button data-sub="list" class="${sub==='list'?'active':''}">Traces</button><button data-sub="observations" class="${sub==='observations'?'active':''}">Observations</button>` : '';
  if (next === 'traces') { activeTraceId = null; }
  await PAGES[next].render();
}

/* ============ events ============ */
document.querySelectorAll('.nav-item').forEach(b => b.addEventListener('click', () => navigate(b.dataset.page)));
$('#subtabs').addEventListener('click', (e) => {
  const b = e.target.closest('[data-sub]'); if (!b) return;
  sub = b.dataset.sub;
  document.querySelectorAll('#subtabs button').forEach(x => x.classList.toggle('active', x.dataset.sub===sub));
  if (sub === 'list') renderTraces(); else renderObservations();
});
$('#range').value = String(range);
$('#range').addEventListener('change', (e) => {
  range = Number(e.target.value); localStorage.setItem('ot-range', range);
  loadStats(); PAGES[page].render();
});
$('#content').addEventListener('click', (e) => {
  if (e.target.id === 'clear-filter') { e.preventDefault(); sessionFilter=null; userFilter=null; loadTraceList(); return; }
  const vb = e.target.closest('.view-tabs button');
  if (vb) { viewMode = vb.dataset.view; localStorage.setItem('ot-view', viewMode); renderTraceView(); return; }
  const dt = e.target.closest('[data-dtab]');
  if (dt) { detailTab = dt.dataset.dtab; renderSpanDetail(); return; }
  const sp = e.target.closest('[data-span]');
  if (sp) { selectedSpanId = sp.dataset.span; renderTraceView(); renderSpanDetail(); return; }
  const tr = e.target.closest('.trace-row');
  if (tr?.dataset.id) { openTrace(tr.dataset.id); return; }
  const obs = e.target.closest('[data-trace]');
  if (obs) { navigate('traces').then(() => openTrace(obs.dataset.trace)); return; }
  const ss = e.target.closest('[data-session]');
  if (ss) { sessionFilter = ss.dataset.session; userFilter = null; navigate('traces').then(loadTraceList); return; }
  const us = e.target.closest('[data-user]');
  if (us) { userFilter = us.dataset.user; sessionFilter = null; navigate('traces').then(loadTraceList); return; }
});

/* ============ boot + auto-refresh ============ */
loadStats(); navigate('traces');
setInterval(() => {
  loadStats();
  if (page === 'traces') { if (sub==='list') { loadTraceList(); if (activeTraceId) openTrace(activeTraceId, true); } else loadObservations(); }
  else PAGES[page].render();
}, 5000);
</script>
</body>
</html>
