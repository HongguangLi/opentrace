<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>langfuse-relay</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' rx='3' fill='%2358a6ff'/><path d='M4 11 8 5l4 6' stroke='white' stroke-width='1.6' fill='none'/></svg>">
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2129; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950;
    --red: #f85149; --amber: #d29922; --purple: #bc8cff;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text);
    font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, sans-serif; }
  code, .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

  header { display: flex; align-items: center; gap: 20px; padding: 10px 20px;
    border-bottom: 1px solid var(--border); background: var(--panel);
    position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 16px; font-weight: 600; }
  header h1 span { color: var(--accent); }
  nav { display: flex; gap: 4px; }
  nav button { padding: 5px 14px; border-radius: 6px; color: var(--muted); font-size: 13px; }
  nav button.active { background: var(--panel2); color: var(--text); }
  #stats { display: flex; gap: 18px; margin-left: auto; color: var(--muted); font-size: 12px; }
  #stats b { color: var(--text); }

  main { height: calc(100vh - 49px); }
  #traces-page { display: grid; grid-template-columns: minmax(320px, 420px) 1fr; height: 100%; }
  #list-pane { border-right: 1px solid var(--border); overflow-y: auto; }
  #search { width: calc(100% - 24px); margin: 12px; padding: 7px 10px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 13px; }
  #search:focus { outline: none; border-color: var(--accent); }
  .trace-row { padding: 10px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; display: flex; flex-direction: column; gap: 3px; }
  .trace-row:hover { background: var(--panel); }
  .trace-row.active { background: var(--panel); box-shadow: inset 3px 0 0 var(--accent); }
  .trace-title { font-weight: 600; font-size: 13px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  .trace-meta { display: flex; gap: 10px; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  .badge { display: inline-block; padding: 0 6px; border-radius: 10px; font-size: 11px;
    border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }
  .badge.llm { color: var(--purple); border-color: var(--purple); }
  .badge.err { color: var(--red); border-color: var(--red); }

  #detail-pane { overflow-y: auto; padding: 16px 20px; }
  .placeholder { color: var(--muted); margin-top: 40px; text-align: center; line-height: 2; }
  #trace-head { border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 12px; }
  #trace-head h2 { font-size: 15px; margin-bottom: 4px; }
  #trace-head .trace-meta { font-size: 12.5px; }
  .view-tabs { display: flex; gap: 4px; margin: 10px 0; }
  .view-tabs button { padding: 4px 12px; border-radius: 6px; font-size: 12.5px;
    color: var(--muted); border: 1px solid transparent; }
  .view-tabs button.active { background: var(--panel2); color: var(--text);
    border-color: var(--border); }

  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.llm { background: var(--purple); } .dot.tool { background: var(--amber); }
  .dot.agent { background: var(--green); } .dot.chain, .dot.other { background: var(--muted); }
  .dot.error { background: var(--red); }

  /* tree view */
  .span-children { margin-left: 22px; border-left: 1px solid var(--border); padding-left: 6px; }
  .span-line { display: flex; align-items: center; gap: 8px; padding: 5px 8px;
    border-radius: 6px; cursor: pointer; font-size: 13px; margin: 2px 0; }
  .span-line:hover { background: var(--panel); }
  .span-line.selected { background: var(--panel); box-shadow: inset 0 0 0 1px var(--accent); }
  .span-dur { margin-left: auto; color: var(--muted); font-size: 12px; white-space: nowrap; }
  .span-tokens { color: var(--purple); font-size: 12px; white-space: nowrap; }

  /* timeline view */
  .tl-row { display: grid; grid-template-columns: minmax(200px, 320px) 1fr;
    align-items: center; gap: 10px; padding: 3px 6px; border-radius: 6px;
    cursor: pointer; font-size: 12.5px; }
  .tl-row:hover { background: var(--panel); }
  .tl-row.selected { background: var(--panel); box-shadow: inset 0 0 0 1px var(--accent); }
  .tl-name { display: flex; align-items: center; gap: 7px; overflow: hidden;
    white-space: nowrap; text-overflow: ellipsis; }
  .tl-track { position: relative; height: 16px; background: var(--panel);
    border-radius: 4px; overflow: hidden; }
  .tl-bar { position: absolute; top: 2px; bottom: 2px; border-radius: 3px; min-width: 2px; }
  .tl-bar.llm { background: var(--purple); } .tl-bar.tool { background: var(--amber); }
  .tl-bar.agent { background: var(--green); } .tl-bar.chain, .tl-bar.other { background: #6e7681; }
  .tl-bar.error { background: var(--red); }
  .tl-label { position: absolute; font-size: 10.5px; color: var(--muted);
    top: 0; line-height: 16px; }

  /* graph view */
  #graph-wrap { overflow: auto; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); max-height: 55vh; }
  .gnode { cursor: pointer; }
  .gnode rect { fill: var(--panel); stroke: var(--border); stroke-width: 1; rx: 8; }
  .gnode.selected rect { stroke: var(--accent); stroke-width: 2; }
  .gnode.llm rect { stroke: var(--purple); }
  .gnode.tool rect { stroke: var(--amber); }
  .gnode.agent rect { stroke: var(--green); }
  .gnode.error rect { stroke: var(--red); }
  .gnode text { fill: var(--text); font-size: 11.5px; }
  .gnode .sub { fill: var(--muted); font-size: 10px; }
  .gedge { fill: none; stroke: var(--border); stroke-width: 1.4; }

  /* span detail */
  #span-detail { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 14px; }
  #span-detail h3 { font-size: 14px; margin-bottom: 8px; }
  .kv { display: grid; grid-template-columns: 150px 1fr; gap: 4px 12px;
    font-size: 13px; margin-bottom: 12px; }
  .kv dt { color: var(--muted); } .kv dd { word-break: break-all; }
  .dtabs { display: flex; gap: 4px; margin-bottom: 10px; }
  .dtabs button { padding: 4px 12px; border-radius: 6px; font-size: 12.5px; color: var(--muted); }
  .dtabs button.active { background: var(--panel2); color: var(--text); }
  .io-block { margin-bottom: 12px; }
  .io-block h4 { font-size: 11.5px; text-transform: uppercase; letter-spacing: .05em;
    color: var(--muted); margin-bottom: 6px; }
  .io-block pre { background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px; white-space: pre-wrap; word-break: break-word;
    max-height: 300px; overflow-y: auto; font-size: 12.5px; }
  .io-block.input pre { border-left: 3px solid var(--accent); }
  .io-block.output pre { border-left: 3px solid var(--green); }

  /* dashboard page */
  #dash-page { padding: 20px; overflow-y: auto; height: 100%; display: none; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px; margin-bottom: 20px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px; }
  .card .num { font-size: 22px; font-weight: 700; }
  .card .lbl { font-size: 12px; color: var(--muted); }
  .chart-box { background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; }
  .chart-box h3 { font-size: 13px; margin-bottom: 10px; color: var(--muted); }
  .hbar-row { display: grid; grid-template-columns: minmax(160px, 320px) 1fr 90px;
    gap: 10px; align-items: center; font-size: 12.5px; padding: 3px 0; }
  .hbar-track { height: 14px; background: var(--bg); border-radius: 4px; overflow: hidden; }
  .hbar-fill { height: 100%; background: var(--purple); border-radius: 4px; }
  .hbar-val { color: var(--muted); text-align: right; }
</style>
</head>
<body>
<header>
  <h1>langfuse<span>-relay</span></h1>
  <nav>
    <button id="tab-traces" class="active">Traces</button>
    <button id="tab-sessions">Sessions</button>
    <button id="tab-dash">Dashboard</button>
  </nav>
  <div id="stats"></div>
</header>
<main>
  <div id="traces-page">
    <div id="list-pane">
      <input id="search" type="search" placeholder="Search traces (name, model, content)…">
      <div id="trace-list"></div>
    </div>
    <div id="detail-pane">
      <div class="placeholder">Select a trace to inspect its spans<br>
        <span style="font-size:12.5px">Views: Tree · Timeline · Graph — click any span for input/output, attributes, and events</span>
      </div>
    </div>
  </div>
  <div id="sessions-page" style="display:none;padding:20px;overflow-y:auto;height:100%"></div>
  <div id="dash-page"></div>
</main>
<script>
const $ = (sel, el = document) => el.querySelector(sel);
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const fmtDur = (ms) => ms >= 1000 ? (ms / 1000).toFixed(2) + 's' : Math.round(ms) + 'ms';
const fmtTok = (n) => (n ?? 0) >= 1000 ? ((n) / 1000).toFixed(1) + 'k' : String(n ?? 0);
const nsToMs = (ns) => Number(BigInt(ns) / 1000000n);

let activeTraceId = null, currentSpans = [], selectedSpanId = null;
let viewMode = localStorage.getItem('lr-view') || 'timeline';
let detailTab = 'preview';

/* ---------- header stats ---------- */
async function loadStats() {
  const { totals } = await (await fetch('/api/stats')).json();
  $('#stats').innerHTML =
    `<span><b>${totals.traces ?? 0}</b> traces</span>` +
    `<span><b>${totals.spans ?? 0}</b> spans</span>` +
    `<span><b>${totals.llm_calls ?? 0}</b> LLM calls</span>` +
    `<span><b>${fmtTok(totals.prompt_tokens)}</b> in / <b>${fmtTok(totals.completion_tokens)}</b> out</span>` +
    ((totals.cost_usd ?? 0) > 0 ? `<span><b>$${totals.cost_usd.toFixed(4)}</b></span>` : '');
}

/* ---------- trace list ---------- */
let sessionFilter = null;
async function loadTraces() {
  const q = $('#search').value.trim();
  const url = '/api/traces?limit=100' + (q ? '&q=' + encodeURIComponent(q) : '') +
    (sessionFilter ? '&session=' + encodeURIComponent(sessionFilter) : '');
  const { traces } = await (await fetch(url)).json();
  const chip = sessionFilter
    ? `<div style="padding:0 12px 8px"><span class="badge" style="color:var(--accent);border-color:var(--accent)">
        session: ${esc(sessionFilter.slice(0, 24))}${sessionFilter.length > 24 ? '…' : ''}
        <a href="#" id="clear-session" style="color:var(--muted);text-decoration:none;margin-left:6px">✕</a></span></div>`
    : '';
  $('#trace-list').innerHTML = chip + traces.map((t) => `
    <div class="trace-row${t.trace_id === activeTraceId ? ' active' : ''}" data-id="${t.trace_id}">
      <div class="trace-title">${esc(t.root_name || t.model || t.trace_id.slice(0, 16))}</div>
      <div class="trace-meta">
        <span>${new Date(t.start_ms).toLocaleString()}</span>
        <span>${fmtDur(t.end_ms - t.start_ms)}</span>
        <span class="badge">${esc(t.service)}</span>
        <span class="badge llm">${t.llm_calls} LLM · ${fmtTok(t.total_tokens)} tok</span>
        ${t.error_count > 0 ? `<span class="badge err">${t.error_count} err</span>` : ''}
      </div>
    </div>`).join('') ||
    `<div class="placeholder" style="padding:20px">No traces yet.<br>
     <span style="font-size:12px">Point an OTLP exporter at <code>/v1/traces</code><br>
     or a provider base URL at <code>/proxy/openai</code> · <code>/proxy/anthropic</code></span></div>`;
}

/* ---------- trace detail ---------- */
function buildTree(spans) {
  const byId = new Map(spans.map((s) => [s.span_id, { span: s, children: [] }]));
  const roots = [];
  for (const node of byId.values()) {
    const parent = node.span.parent_span_id && byId.get(node.span.parent_span_id);
    if (parent) parent.children.push(node); else roots.push(node);
  }
  const sortRec = (nodes) => { nodes.sort((a, b) =>
    Number(BigInt(a.span.start_ns) - BigInt(b.span.start_ns))); nodes.forEach((n) => sortRec(n.children)); };
  sortRec(roots);
  return roots;
}
const typeOf = (s) => s.status_code === 'ERROR' ? 'error' : (s.span_type || 'other');

function renderTreeView(roots) {
  const renderNode = (node) => {
    const s = node.span;
    return `<div>
      <div class="span-line${s.span_id === selectedSpanId ? ' selected' : ''}" data-span="${s.span_id}">
        <span class="dot ${typeOf(s)}"></span><span>${esc(s.name)}</span>
        ${s.model ? `<span class="badge llm">${esc(s.model)}</span>` : ''}
        ${s.total_tokens ? `<span class="span-tokens">${fmtTok(s.total_tokens)} tok</span>` : ''}
        <span class="span-dur">${fmtDur(s.duration_ms)}</span>
      </div>
      ${node.children.length ? `<div class="span-children">${node.children.map(renderNode).join('')}</div>` : ''}
    </div>`;
  };
  return roots.map(renderNode).join('');
}

function renderTimelineView(roots) {
  const t0 = Math.min(...currentSpans.map((s) => nsToMs(s.start_ns)));
  const t1 = Math.max(...currentSpans.map((s) => nsToMs(s.end_ns)));
  const total = Math.max(t1 - t0, 1);
  const rows = [];
  const walk = (node, depth) => {
    const s = node.span;
    const left = (nsToMs(s.start_ns) - t0) / total * 100;
    const width = Math.max(s.duration_ms / total * 100, 0.5);
    const labelSide = left + width < 70
      ? `left:calc(${Math.min(left + width, 96)}% + 5px)` : `right:calc(${100 - left}% + 5px)`;
    rows.push(`<div class="tl-row${s.span_id === selectedSpanId ? ' selected' : ''}" data-span="${s.span_id}">
      <div class="tl-name" style="padding-left:${depth * 16}px">
        <span class="dot ${typeOf(s)}"></span><span>${esc(s.name)}</span>
      </div>
      <div class="tl-track">
        <div class="tl-bar ${typeOf(s)}" style="left:${left}%;width:${width}%"></div>
        <span class="tl-label" style="${labelSide}">${fmtDur(s.duration_ms)}${s.total_tokens ? ' · ' + fmtTok(s.total_tokens) + ' tok' : ''}</span>
      </div>
    </div>`);
    node.children.forEach((c) => walk(c, depth + 1));
  };
  roots.forEach((r) => walk(r, 0));
  return `<div style="font-size:11px;color:var(--muted);text-align:right;margin-bottom:4px">total ${fmtDur(total)}</div>` + rows.join('');
}

/* mind-map style graph: root on the left, execution fans out rightwards */
function renderGraphView(roots) {
  const NODE_W = 170, NODE_H = 46, GAP_X = 70, GAP_Y = 14;
  let leafY = 0;
  const nodes = [], edges = [];
  const layout = (node, depth) => {
    const s = node.span;
    const x = depth * (NODE_W + GAP_X);
    let y;
    if (node.children.length === 0) {
      y = leafY; leafY += NODE_H + GAP_Y;
    } else {
      const childYs = node.children.map((c) => layout(c, depth + 1));
      y = (Math.min(...childYs) + Math.max(...childYs)) / 2;
    }
    nodes.push({ s, x, y });
    for (const c of node.children) edges.push({ from: { x, y }, toSpan: c.span });
    return y;
  };
  roots.forEach((r) => { layout(r, 0); leafY += GAP_Y; });
  const pos = new Map(nodes.map((n) => [n.s.span_id, n]));
  const width = Math.max(...nodes.map((n) => n.x)) + NODE_W + 20;
  const height = Math.max(...nodes.map((n) => n.y)) + NODE_H + 20;
  const edgeEls = edges.map((e) => {
    const to = pos.get(e.toSpan.span_id);
    const x1 = e.from.x + NODE_W, y1 = e.from.y + NODE_H / 2 + 10;
    const x2 = to.x, y2 = to.y + NODE_H / 2 + 10;
    const mx = (x1 + x2) / 2;
    return `<path class="gedge" d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}"/>`;
  }).join('');
  const nodeEls = nodes.map(({ s, x, y }) => `
    <g class="gnode ${typeOf(s)}${s.span_id === selectedSpanId ? ' selected' : ''}" data-span="${s.span_id}"
       transform="translate(${x},${y + 10})">
      <rect width="${NODE_W}" height="${NODE_H}" rx="8"/>
      <circle cx="14" cy="16" r="4" class="dot" fill="${
        { llm: 'var(--purple)', tool: 'var(--amber)', agent: 'var(--green)', error: 'var(--red)' }[typeOf(s)] ?? 'var(--muted)'}"/>
      <text x="26" y="20">${esc(s.name.length > 17 ? s.name.slice(0, 16) + '…' : s.name)}</text>
      <text x="26" y="36" class="sub">${fmtDur(s.duration_ms)}${s.total_tokens ? ' · ' + fmtTok(s.total_tokens) + ' tok' : ''}${s.model ? ' · ' + esc(String(s.model).split('/').pop().slice(0, 14)) : ''}</text>
    </g>`).join('');
  return `<div id="graph-wrap"><svg width="${width}" height="${height + 20}" xmlns="http://www.w3.org/2000/svg">${edgeEls}${nodeEls}</svg></div>`;
}

function renderTraceView() {
  const roots = buildTree(currentSpans);
  const el = $('#trace-view');
  el.innerHTML = viewMode === 'tree' ? renderTreeView(roots)
    : viewMode === 'graph' ? renderGraphView(roots)
    : renderTimelineView(roots);
  document.querySelectorAll('.view-tabs button').forEach((b) =>
    b.classList.toggle('active', b.dataset.view === viewMode));
}

function renderSpanDetail() {
  const s = currentSpans.find((x) => x.span_id === selectedSpanId);
  const el = $('#span-detail');
  if (!s) { el.innerHTML = ''; return; }
  const attrs = JSON.parse(s.attributes_json || '{}');
  const events = JSON.parse(s.events_json || '[]');
  const tabs = `<div class="dtabs">
    <button data-dtab="preview" class="${detailTab === 'preview' ? 'active' : ''}">Preview</button>
    <button data-dtab="attrs" class="${detailTab === 'attrs' ? 'active' : ''}">Attributes (${Object.keys(attrs).length})</button>
    <button data-dtab="events" class="${detailTab === 'events' ? 'active' : ''}">Events (${events.length})</button>
  </div>`;
  let body = '';
  if (detailTab === 'preview') {
    body = (s.input_text ? `<div class="io-block input"><h4>Input</h4><pre>${esc(s.input_text)}</pre></div>` : '') +
      (s.output_text ? `<div class="io-block output"><h4>Output</h4><pre>${esc(s.output_text)}</pre></div>` : '') ||
      '<div style="color:var(--muted);font-size:13px">No parsed input/output on this span — check the Attributes tab for raw data.</div>';
  } else if (detailTab === 'attrs') {
    // Embedded JSON strings (NeMo Relay's *_json payloads etc.) are
    // unreadable when escaped — parse them so they render as structures.
    const deepParse = (v) => {
      if (typeof v === 'string' && /^\s*[{\[]/.test(v)) {
        try { return JSON.parse(v); } catch { /* keep as string */ }
      }
      return v;
    };
    body = Object.entries(attrs).map(([k, v]) => {
      const parsed = deepParse(v);
      const isObj = typeof parsed === 'object' && parsed !== null;
      const text = isObj ? JSON.stringify(parsed, null, 2) : String(parsed);
      const big = text.length > 400;
      return `<details class="io-block"${big ? '' : ' open'}>
        <summary style="cursor:pointer;font-size:12px;color:var(--accent);margin-bottom:4px" class="mono">${esc(k)}</summary>
        <pre>${esc(text)}</pre>
      </details>`;
    }).join('') || '<div style="color:var(--muted);font-size:13px">No attributes.</div>';
  } else {
    body = events.length === 0 ? '<div style="color:var(--muted);font-size:13px">No events.</div>'
      : events.map((ev) => `<div class="io-block"><h4>${esc(ev.name)} — ${new Date(nsToMs(ev.timeNs ?? ev.time_ns ?? 0)).toLocaleTimeString()}</h4>
          <pre>${esc(JSON.stringify(ev.attributes ?? {}, null, 2))}</pre></div>`).join('');
  }
  el.innerHTML = `
    <h3>${esc(s.name)}</h3>
    <dl class="kv">
      <dt>Span / Parent</dt><dd class="mono">${s.span_id}${s.parent_span_id ? ' ← ' + s.parent_span_id : ''}</dd>
      <dt>Type / Kind</dt><dd>${esc(s.span_type)} / ${esc(s.kind)}${s.scope ? ' · ' + esc(s.scope) : ''}</dd>
      ${s.model ? `<dt>Model</dt><dd>${esc(s.model)}</dd>` : ''}
      <dt>Start · Duration</dt><dd>${new Date(nsToMs(s.start_ns)).toLocaleString()} · ${fmtDur(s.duration_ms)}</dd>
      <dt>Status</dt><dd>${esc(s.status_code)}${s.status_message ? ' — ' + esc(s.status_message) : ''}</dd>
      ${s.total_tokens ? `<dt>Tokens</dt><dd>${s.prompt_tokens ?? '?'} in + ${s.completion_tokens ?? '?'} out = ${s.total_tokens}</dd>` : ''}
      ${s.cost_usd ? `<dt>Cost</dt><dd>$${s.cost_usd}</dd>` : ''}
    </dl>
    ${tabs}${body}`;
}

async function openTrace(traceId, keepSelection = false) {
  activeTraceId = traceId;
  document.querySelectorAll('.trace-row').forEach((el) =>
    el.classList.toggle('active', el.dataset.id === traceId));
  const { spans } = await (await fetch('/api/traces/' + traceId)).json();
  currentSpans = spans;
  if (!keepSelection || !spans.some((s) => s.span_id === selectedSpanId)) {
    selectedSpanId = (spans.find((s) => s.span_type === 'llm') ?? spans[0])?.span_id ?? null;
  }
  const t0 = Math.min(...spans.map((s) => nsToMs(s.start_ns)));
  const t1 = Math.max(...spans.map((s) => nsToMs(s.end_ns)));
  const tok = spans.reduce((a, s) => a + (s.total_tokens ?? 0), 0);
  const cost = spans.reduce((a, s) => a + (s.cost_usd ?? 0), 0);
  const llm = spans.filter((s) => s.span_type === 'llm').length;
  $('#detail-pane').innerHTML = `
    <div id="trace-head">
      <h2>${esc(spans.find((s) => !s.parent_span_id)?.name ?? traceId.slice(0, 16))}</h2>
      <div class="trace-meta">
        <span class="mono">${traceId}</span>
        <span>${new Date(t0).toLocaleString()}</span><span>${fmtDur(t1 - t0)}</span>
        <span>${spans.length} spans</span><span>${llm} LLM</span>
        <span>${fmtTok(tok)} tok</span>${cost > 0 ? `<span>$${cost.toFixed(4)}</span>` : ''}
        <span class="badge">${esc(spans[0]?.service ?? '')}</span>
      </div>
    </div>
    <div class="view-tabs">
      <button data-view="timeline">Timeline</button>
      <button data-view="tree">Tree</button>
      <button data-view="graph">Graph</button>
    </div>
    <div id="trace-view"></div>
    <div id="span-detail"></div>`;
  renderTraceView();
  renderSpanDetail();
}

/* ---------- sessions page ---------- */
async function loadSessions() {
  const { sessions } = await (await fetch('/api/sessions')).json();
  $('#sessions-page').innerHTML = `
    <div class="chart-box"><h3>Sessions (${sessions.length})</h3>
    ${sessions.map((s) => `
      <div class="trace-row" data-session="${esc(s.session_id)}" style="border-radius:6px">
        <div class="trace-title mono">${esc(s.session_id)}</div>
        <div class="trace-meta">
          <span>${new Date(s.first_ms).toLocaleString()} → ${new Date(s.last_ms).toLocaleTimeString()}</span>
          <span class="badge">${esc(s.service)}</span>
          <span class="badge">${s.trace_count} traces · ${s.span_count} spans</span>
          <span class="badge llm">${s.llm_calls} LLM · ${fmtTok(s.total_tokens)} tok</span>
          ${s.cost_usd > 0 ? `<span class="badge">$${s.cost_usd.toFixed(4)}</span>` : ''}
          ${s.error_count > 0 ? `<span class="badge err">${s.error_count} err</span>` : ''}
        </div>
      </div>`).join('') ||
      `<div style="color:var(--muted);font-size:13px;line-height:1.8">No sessions yet.<br>
       Sessions group traces by conversation: NeMo Relay exports include one automatically;
       standard <code>session.id</code> / <code>gen_ai.conversation.id</code> attributes work too;
       proxy callers can send an <code>x-session-id</code> header.</div>`}
    </div>`;
}
$('#sessions-page').addEventListener('click', (e) => {
  const row = e.target.closest('[data-session]');
  if (!row) return;
  sessionFilter = row.dataset.session;
  activeTraceId = null;
  switchPage('traces');
  loadTraces();
});

/* ---------- dashboard page ---------- */
async function loadDashboard() {
  const [{ totals, services, models }, { traces }] = await Promise.all([
    (await fetch('/api/stats')).json(),
    (await fetch('/api/traces?limit=500')).json(),
  ]);
  const now = Date.now();
  const buckets = Array.from({ length: 24 }, () => ({ traces: 0, tokens: 0 }));
  for (const t of traces) {
    const age = Math.floor((now - t.start_ms) / 3600000);
    if (age >= 0 && age < 24) { buckets[23 - age].traces++; buckets[23 - age].tokens += t.total_tokens ?? 0; }
  }
  const maxTr = Math.max(...buckets.map((b) => b.traces), 1);
  const barW = 100 / 24;
  const bars = buckets.map((b, i) =>
    `<rect x="${i * barW + 0.4}%" y="${100 - b.traces / maxTr * 92}%" width="${barW - 0.8}%"
       height="${b.traces / maxTr * 92}%" rx="2" fill="var(--accent)">
       <title>${b.traces} traces · ${fmtTok(b.tokens)} tok</title></rect>`).join('');
  const maxModelTok = Math.max(...models.map((m) => (m.prompt_tokens ?? 0) + (m.completion_tokens ?? 0)), 1);
  const modelRows = models.map((m) => {
    const tk = (m.prompt_tokens ?? 0) + (m.completion_tokens ?? 0);
    return `<div class="hbar-row"><span title="${esc(m.model)}">${esc(m.model)}</span>
      <div class="hbar-track"><div class="hbar-fill" style="width:${tk / maxModelTok * 100}%"></div></div>
      <span class="hbar-val">${m.calls} calls · ${fmtTok(tk)}</span></div>`;
  }).join('') || '<div style="color:var(--muted);font-size:13px">No LLM calls recorded yet.</div>';
  const svcRows = services.map((s) => `<div class="hbar-row"><span>${esc(s.service)}</span>
      <div class="hbar-track"><div class="hbar-fill" style="width:${s.spans / Math.max(...services.map(x => x.spans), 1) * 100}%;background:var(--accent)"></div></div>
      <span class="hbar-val">${s.traces} traces · ${s.spans} spans</span></div>`).join('');
  $('#dash-page').innerHTML = `
    <div class="cards">
      <div class="card"><div class="num">${totals.traces ?? 0}</div><div class="lbl">Traces</div></div>
      <div class="card"><div class="num">${totals.spans ?? 0}</div><div class="lbl">Spans</div></div>
      <div class="card"><div class="num">${totals.llm_calls ?? 0}</div><div class="lbl">LLM calls</div></div>
      <div class="card"><div class="num">${fmtTok(totals.prompt_tokens)}</div><div class="lbl">Input tokens</div></div>
      <div class="card"><div class="num">${fmtTok(totals.completion_tokens)}</div><div class="lbl">Output tokens</div></div>
      <div class="card"><div class="num">$${(totals.cost_usd ?? 0).toFixed(4)}</div><div class="lbl">Cost (reported)</div></div>
    </div>
    <div class="chart-box"><h3>Traces — last 24 hours</h3>
      <svg width="100%" height="120">${bars}</svg></div>
    <div class="chart-box"><h3>Token usage by model</h3>${modelRows}</div>
    <div class="chart-box"><h3>Services</h3>${svcRows}</div>`;
}

/* ---------- events ---------- */
$('#trace-list').addEventListener('click', (e) => {
  if (e.target.id === 'clear-session') {
    e.preventDefault();
    sessionFilter = null;
    loadTraces();
    return;
  }
  const row = e.target.closest('.trace-row');
  if (row?.dataset.id) openTrace(row.dataset.id);
});
$('#detail-pane').addEventListener('click', (e) => {
  const viewBtn = e.target.closest('.view-tabs button');
  if (viewBtn) { viewMode = viewBtn.dataset.view; localStorage.setItem('lr-view', viewMode);
    renderTraceView(); return; }
  const dtab = e.target.closest('[data-dtab]');
  if (dtab) { detailTab = dtab.dataset.dtab; renderSpanDetail(); return; }
  const spanEl = e.target.closest('[data-span]');
  if (spanEl) { selectedSpanId = spanEl.dataset.span; renderTraceView(); renderSpanDetail(); }
});
let searchTimer;
$('#search').addEventListener('input', () => {
  clearTimeout(searchTimer); searchTimer = setTimeout(loadTraces, 250);
});
let page = 'traces';
function switchPage(next) {
  page = next;
  $('#traces-page').style.display = page === 'traces' ? 'grid' : 'none';
  $('#sessions-page').style.display = page === 'sessions' ? 'block' : 'none';
  $('#dash-page').style.display = page === 'dash' ? 'block' : 'none';
  $('#tab-traces').classList.toggle('active', page === 'traces');
  $('#tab-sessions').classList.toggle('active', page === 'sessions');
  $('#tab-dash').classList.toggle('active', page === 'dash');
  if (page === 'dash') loadDashboard();
  if (page === 'sessions') loadSessions();
}
$('#tab-traces').addEventListener('click', () => switchPage('traces'));
$('#tab-sessions').addEventListener('click', () => switchPage('sessions'));
$('#tab-dash').addEventListener('click', () => switchPage('dash'));

loadStats(); loadTraces();
setInterval(() => {
  loadStats();
  if (page === 'traces') { loadTraces(); if (activeTraceId) openTrace(activeTraceId, true); }
  else if (page === 'sessions') loadSessions();
  else loadDashboard();
}, 5000);
</script>
</body>
</html>
